<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind + DaisyUI cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fontawsome cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
    <title>GitHub Issues Tracker</title>
</head>
<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm ">
        <div class="w-11/12 mx-auto flex justify-between">
  <div class="logo  flex gap-1 items-center">
            <img class="w-[36px] h-[37px]" src="./assets/github-logo.png" alt="">
            <h2>GitHub Issues Tracker</h2>
        </div>
        
        <div class="join gap-3">
  <div>
    <label class="input validator join-item rounded-md"> 
        <i class="fa-solid fa-magnifying-glass text-gray-400"></i>    
      <input id="input-search" type="text" placeholder="Search issues..." required />
    </label>
  </div>
  <button id="btn-search" class="btn btn-primary join-item rounded-md"><i class="fa-solid fa-plus"></i> New Issue</button>
  </div>
  </div>
</div>
    </header>
    

    <section class="bg-[#F8FAFC]">

    </section>
</body>
</html>
