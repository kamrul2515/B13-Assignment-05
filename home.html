<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind + DaisyUI cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fontawsome cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
    <title>GitHub Issues Tracker</title>
</head>
<body class="bg-[#F8FAFC] min-h-screen">
    <header class="bg-white border-b border-gray-100">
        <div class="navbar bg-base-100 shadow-sm ">
        <div class="w-11/12 mx-auto flex justify-between">
  <div class="logo  flex gap-1 items-center">
            <img class="w-[36px] h-[37px]" src="./assets/github-logo.png" alt="">
            <h2>GitHub Issues Tracker</h2>
        </div>
        
        <div class="join gap-3">
  <div>
    <label class="input validator join-item rounded-md"> 
        <i class="fa-solid fa-magnifying-glass text-gray-400"></i>    
      <input id="input-search" type="text" placeholder="Search issues..." required />
    </label>
  </div>
  <button id="btn-search" class="btn btn-primary join-item rounded-md"><i class="fa-solid fa-plus"></i> New Issue</button>
  </div>
  </div>
</div>
    </header>
    

    <section class="w-10/12 mx-auto mt-10 pb-14 space-y-6 ">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <div class="flex gap-2">
            <button id="btn-all" class="btn btn-primary px-8">All</button>
            <button id="btn-open" class="btn btn-outline border-gray-200 px-8">Open</button>
            <button id="btn-closed" class="btn btn-outline border-gray-200 px-8">Closed</button>
            </div>
        </div>

        <div class="bg-white rounded-xl overflow-hidden  shadow-md">

            <div class="p-8 border-b border-gray-100">
                <div class="flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="bg-[#ECE4FF] p-3 rounded-full">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h1 class="text-[20px] font-semibold"><span id="issue-count">0</span> Issues</h1>
                        <p class="text-[16px] text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-6 font-medium text-[16px]">
                    <span class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-green-500"></div> Open</span>
                    <span class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-purple-500"></div> Closed</span>
                </div>
            </div>
            </div>

            <div class="p-8 bg-[#FBFBFB] min-h-[500px]">
                <div id="loader" class="hidden flex justify-center my-10">
                <span class="loading loading-spinner loading-lg text-primary"></span>
            </div>
            
            <div id="issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">
                </div>
            </div>
        </div>
    </section>


<div id="issue-modal" class="modal">
    <div class="modal-box max-w-2xl bg-white rounded-xl p-6">
        <div class="mb-4">
            <h3 id="modal-title" class="font-bold text-2xl mb-2"></h3>
            <div class="flex items-center gap-2 text-sm text-gray-500 mb-2">
                <span id="modal-status-badge" class="px-3 py-1 rounded-full font-medium text-white"></span>
                <span>• Opened by <span id="modal-author" class="font-semibold"></span></span>
                <span>• <span id="modal-createdAt"></span></span>
            </div>
            <div class="flex gap-2 mb-2" id="modal-labels"></div>
        </div>
        <p id="modal-description" class="text-gray-700 mb-6"></p>
        <div class="grid grid-cols-2 gap-4 bg-gray-50 p-4 rounded mb-4">
            <div>
                <p class="text-gray-500 text-sm">Assignee:</p>
                <p class="font-semibold" id="modal-assignee"></p>
            </div>
            <div>
                <p class="text-gray-500 text-sm">Priority:</p>
                <span id="modal-priority-badge" class="px-3 py-1 rounded-full text-white font-semibold"></span>
            </div>
        </div>
        <div class="modal-action">
            <button class="btn btn-primary" id="close-modal">Close</button>
        </div>
    </div>
</div>

    
    <script src="script/card.js"></script>
</body>
</html>
